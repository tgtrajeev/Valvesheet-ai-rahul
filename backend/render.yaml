services:
  - type: web
    name: valve-agent-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: valve-agent-db
          property: connectionString
      - key: AGENT_MODEL
        value: claude-sonnet-4-20250514
      - key: AGENT_TEMPERATURE
        value: "0.1"
      - key: AGENT_MAX_TOOL_CALLS
        value: "10"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
    healthCheckPath: /health

databases:
  - name: valve-agent-db
    plan: starter
    databaseName: valve_agent
